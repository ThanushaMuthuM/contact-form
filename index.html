<!DOCTYPE html>
<html>
<head>
    <title>She Can Foundation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Contact Form</h1>
<form id="contactForm">

    <input
        id="name"
        type="text"
        placeholder="Name"
        required>

    <input
        id="email"
        type="email"
        placeholder="Email"
        required>

    <textarea
        id="message"
        placeholder="Message"
        required></textarea>

    <button type="submit">
        Submit
    </button>

</form>

<p id="success"></p>
<script src="script.js"></script>

</body>
</html>
